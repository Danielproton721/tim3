<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 420" fill="none">
  <defs>
    <linearGradient id="bgDuo" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1540E5"/>
      <stop offset="100%" stop-color="#0029FF"/>
    </linearGradient>
    <linearGradient id="jacketDuoA" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2B6BE0"/>
      <stop offset="100%" stop-color="#1A4BB5"/>
    </linearGradient>
    <linearGradient id="jacketDuoB" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3A85F2"/>
      <stop offset="100%" stop-color="#2457C2"/>
    </linearGradient>
    <linearGradient id="hairDuo" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2A0F08"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <radialGradient id="spotDuo" cx="50%" cy="55%" r="60%">
      <stop offset="0%" stop-color="#FFD500" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0029FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="phoneDuo" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
  </defs>

  <!-- fundo com glow -->
  <rect width="400" height="420" fill="url(#bgDuo)"/>
  <ellipse cx="200" cy="240" rx="200" ry="190" fill="url(#spotDuo)"/>

  <!-- MULHER DA ESQUERDA -->
  <g transform="translate(0,0)">
    <!-- cabelo traseiro -->
    <path d="M70 180 Q55 260 65 380 Q78 430 100 430 L160 430 Q178 400 180 350 Q184 260 170 190 Z" fill="url(#hairDuo)"/>
    <!-- pescoço -->
    <path d="M108 220 L108 250 Q120 260 135 250 L135 220 Z" fill="#8B5A3C"/>
    <!-- jaqueta -->
    <path d="M60 260 Q52 340 62 420 L182 420 Q192 340 180 260 Q160 238 140 236 L100 236 Q80 238 60 260 Z" fill="url(#jacketDuoA)"/>
    <!-- rosto -->
    <ellipse cx="122" cy="180" rx="48" ry="54" fill="#9D6A4B"/>
    <!-- cabelo frontal -->
    <path d="M78 150 Q82 110 122 103 Q162 100 170 145 Q172 165 168 180 Q160 160 125 158 Q90 160 78 180 Z" fill="url(#hairDuo)"/>
    <!-- cabelo lateral esq -->
    <path d="M78 150 Q70 220 72 300 L80 240 Q82 180 92 160 Z" fill="url(#hairDuo)"/>
    <!-- sobrancelhas -->
    <path d="M96 170 Q107 166 118 170" stroke="#1A0A05" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <path d="M128 170 Q140 166 148 170" stroke="#1A0A05" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <!-- olhos -->
    <ellipse cx="104" cy="184" rx="4.5" ry="5.5" fill="#FFFFFF"/>
    <ellipse cx="140" cy="184" rx="4.5" ry="5.5" fill="#FFFFFF"/>
    <circle cx="104" cy="185" r="3" fill="#1A0A05"/>
    <circle cx="140" cy="185" r="3" fill="#1A0A05"/>
    <!-- nariz -->
    <path d="M121 196 Q119 210 122 216" stroke="#6B4530" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- boca sorrindo aberta -->
    <ellipse cx="122" cy="222" rx="11" ry="8" fill="#3A1A1A"/>
    <path d="M114 219 L130 219" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
    <!-- blush -->
    <ellipse cx="94" cy="206" rx="8" ry="4" fill="#D4715A" opacity="0.45"/>
    <ellipse cx="150" cy="206" rx="8" ry="4" fill="#D4715A" opacity="0.45"/>
  </g>

  <!-- MULHER DA DIREITA -->
