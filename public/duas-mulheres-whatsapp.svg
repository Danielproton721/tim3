    <ellipse cx="144" cy="184" rx="4.5" ry="5.5" fill="#FFFFFF"/>
    <circle cx="108" cy="185" r="3" fill="#1A0A05"/>
    <circle cx="144" cy="185" r="3" fill="#1A0A05"/>
    <!-- nariz -->
    <path d="M125 196 Q123 210 126 216" stroke="#6B4530" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- boca aberta sorrindo -->
    <ellipse cx="126" cy="222" rx="11" ry="8" fill="#3A1A1A"/>
    <path d="M118 219 L134 219" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
    <!-- blush -->
    <ellipse cx="98" cy="206" rx="8" ry="4" fill="#D4715A" opacity="0.45"/>
    <ellipse cx="154" cy="206" rx="8" ry="4" fill="#D4715A" opacity="0.45"/>

    <!-- Celular na mão -->
    <rect x="60" y="300" width="58" height="100" rx="10" fill="url(#phoneDuo)" transform="rotate(-10 89 350)"/>
    <rect x="66" y="306" width="46" height="82" rx="4" fill="#00E676" transform="rotate(-10 89 350)"/>
  </g>

